services:
  db:
    image: postgres:16
    restart: always
    env_file:
      - .env.docker
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    restart: always
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data:
